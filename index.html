<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Paris Trace</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><style>body{margin:0;padding:0}#map{height:100vh;width:100vw;background:#222}.btns{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:10px}button{padding:15px 20px;border-radius:25px;border:none;background:#007AFF;color:#white;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,0.5)}</style></head><body><div id="map"></div><div class="btns"><button onclick="track()" id="b">Démarrer</button><button onclick="localStorage.clear();location.reload()" style="background:#FF3B30">Reset</button></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>let m=L.map('map',{zoomControl:false}).setView([48.8566,2.3522],14);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(m);let pts=JSON.parse(localStorage.getItem('p'))||[];let line=L.polyline(pts,{color:'#007AFF',weight:7}).addTo(m);function track(){navigator.geolocation.watchPosition(p=>{let n=[p.coords.latitude,p.coords.longitude];pts.push(n);line.setLatLngs(pts);localStorage.setItem('p',JSON.stringify(pts));m.panTo(n)},null,{enableHighAccuracy:true})}</script></body></html>
